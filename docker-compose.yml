services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: skdk
      POSTGRES_USER: skdk
      POSTGRES_PASSWORD: skdk
    ports:
      - "5432:5432"
    volumes:
      - skdk_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  skdk_pg:
